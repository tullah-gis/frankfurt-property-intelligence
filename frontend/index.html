<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frankfurt Property Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; display: flex; height: 100vh; }

  #sidebar {
    width: 280px; background: #1e2a3a; color: #eee;
    padding: 20px; display: flex; flex-direction: column;
    gap: 14px; overflow-y: auto; flex-shrink: 0;
  }

  #sidebar h1 { font-size: 16px; color: #f1c40f; letter-spacing: 0.1em; text-transform: uppercase; }
  #sidebar h2 { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

  .layer-list { display: flex; flex-direction: column; gap: 6px; }
  .layer-btn {
    padding: 8px 12px; border-radius: 4px;
    border: 1px solid #3d5166; background: transparent;
    color: #aaa; font-size: 12px; cursor: pointer;
    transition: all 0.2s; text-align: left;
  }
  .layer-btn:hover { border-color: #f1c40f; color: #f1c40f; background: rgba(241,196,15,0.05); }
  .layer-btn.active { border-color: #f1c40f; color: #f1c40f; background: rgba(241,196,15,0.1); }

  .legend-bar {
    height: 12px; border-radius: 3px;
    background: linear-gradient(to right, #d73027, #f46d43, #fdae61, #fee08b, #d9ef8b, #a6d96a, #66bd63, #1a9850);
    margin-bottom: 4px;
  }
  .legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; }
  .legend-title { font-size: 11px; color: #aaa; margin-bottom: 6px; }

  .info-panel {
    background: #2c3e50; border-radius: 6px; padding: 12px;
    border-left: 3px solid #f1c40f; display: none;
  }
  .info-panel.visible { display: block; }
  .info-panel h3 { font-size: 12px; color: #f1c40f; margin-bottom: 8px; }
  .info-row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; border-bottom: 1px solid #3d5166; }
  .info-row:last-child { border: none; }
  .info-key { color: #aaa; }
  .info-val { color: #eee; font-weight: 600; }

  #map { flex: 1; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Frankfurt Property Intelligence</h1>
  <p style="font-size:11px;color:#aaa;">Land Value + Quality Index · Frankfurt am Main</p>

  <div>
    <h2>Map Layer</h2>
    <div class="layer-list">
      <button class="layer-btn active" data-mode="quality">
        Quality Index (0–100)<br>
        <span style="font-size:10px;color:#888;">POI-based livability score</span>
      </button>
      <button class="layer-btn" data-mode="brw">
        Land Value (€/m²)<br>
        <span style="font-size:10px;color:#888;">Official Bodenrichtwert 2026</span>
      </button>
    </div>
  </div>

  <div>
    <h2>Legend</h2>
    <div class="legend-title" id="legend-title">Quality Index (0 = low, 100 = high)</div>
    <div class="legend-bar"></div>
    <div class="legend-labels"><span>Low</span><span>Medium</span><span>High</span></div>
  </div>

  <div>
    <h2>Export</h2>
    <a href="http://localhost:8000/api/export/geojson" download style="display:block;padding:8px 12px;background:rgba(241,196,15,0.1);border:1px solid #f1c40f;color:#f1c40f;border-radius:4px;font-size:12px;text-decoration:none;text-align:center;">⬇ Download GeoJSON</a>
  </div>

  <div id="info-panel" class="info-panel">
    <h3 id="info-title">Zone Details</h3>
    <div id="info-rows"></div>
  </div>
</div>

<div id="map"></div>

<script>
const API = "http://localhost:8000/api";

const map = L.map("map", { center: [50.1109, 8.6821], zoom: 12 });
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: "© OpenStreetMap contributors © CARTO"
}).addTo(map);

let zonesLayer = null;
let currentMode = "quality";

function getColor(value, mode) {
  if (mode === "quality") {
    const v = value / 100;
    if (v > 0.8) return "#1a9850";
    if (v > 0.6) return "#66bd63";
    if (v > 0.4) return "#fdae61";
    if (v > 0.2) return "#f46d43";
    return "#d73027";
  } else {
    if (value > 5000) return "#1a9850";
    if (value > 2000) return "#66bd63";
    if (value > 1000) return "#fdae61";
    if (value > 500)  return "#f46d43";
    return "#d73027";
  }
}

async function loadZones() {
  const res = await fetch(`${API}/zones`);
  const data = await res.json();

  if (zonesLayer) map.removeLayer(zonesLayer);

  zonesLayer = L.geoJSON(data, {
    style: feature => ({
      fillColor: getColor(
        currentMode === "quality"
          ? feature.properties.quality_index
          : feature.properties.bodenrichtwert,
        currentMode
      ),
      fillOpacity: 0.7,
      color: "#fff",
      weight: 0.5,
    }),
    onEachFeature: (feature, layer) => {
      layer.on("click", () => showInfo(feature.properties));
      layer.on("mouseover", function() { this.setStyle({ weight: 2, color: "#f1c40f" }); });
      layer.on("mouseout", function() { zonesLayer.resetStyle(this); });
    }
  }).addTo(map);
}

function showInfo(p) {
  const panel = document.getElementById("info-panel");
  panel.classList.add("visible");
  document.getElementById("info-title").textContent = p.ortsteil || "Zone " + p.zoneName;
  document.getElementById("info-rows").innerHTML = `
    <div class="info-row"><span class="info-key">Land Value</span><span class="info-val">${p.bodenrichtwert} €/m²</span></div>
    <div class="info-row"><span class="info-key">Quality Index</span><span class="info-val">${p.quality_index}/100</span></div>
    <div class="info-row"><span class="info-key">Supermarkets (500m)</span><span class="info-val">${p.poi_supermarket}</span></div>
    <div class="info-row"><span class="info-key">Schools (500m)</span><span class="info-val">${p.poi_school}</span></div>
    <div class="info-row"><span class="info-key">Kindergartens (500m)</span><span class="info-val">${p.poi_kindergarten}</span></div>
    <div class="info-row"><span class="info-key">Parks (500m)</span><span class="info-val">${p.poi_park}</span></div>
    <div class="info-row"><span class="info-key">Cafés (500m)</span><span class="info-val">${p.poi_cafe}</span></div>
    <div class="info-row"><span class="info-key">Land Use</span><span class="info-val">${p.entwicklungszustand}</span></div>
  `;
}

document.querySelectorAll(".layer-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".layer-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentMode = btn.dataset.mode;
    document.getElementById("legend-title").textContent =
      currentMode === "quality"
        ? "Quality Index (0 = low, 100 = high)"
        : "Land Value (€/m²) — green = high, red = low";
    loadZones();
  });
});

// Stadtteile Layer
async function loadStadtteile() {
  const res = await fetch(`${API}/stadtteile`);
  const data = await res.json();

  L.geoJSON(data, {
    style: { fillColor: "transparent", color: "#1e2a3a", weight: 2, opacity: 0.8 }
  }).addTo(map);

  data.features.forEach(feature => {
    const layer = L.geoJSON(feature);
    const center = layer.getBounds().getCenter();
    L.marker(center, {
      icon: L.divIcon({
        className: "",
        html: `<div style="font-size:10px;font-weight:700;color:#1e2a3a;
          text-shadow:1px 1px 0 #fff,-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff;
          white-space:nowrap;pointer-events:none;">${feature.properties.name}</div>`,
        iconAnchor: [0, 0]
      })
    }).addTo(map);
  });
}

loadZones();
loadStadtteile();
</script>
</body>
</html>
